name: Release AppImage

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-appimage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream squashfs-tools

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            echo 'No release tag provided' >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if ! git rev-parse --verify "$TAG" >/dev/null 2>&1; then
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

      - name: Build AppImage
        run: bash scripts/build-appimage.sh

      - name: Smoke test AppImage CLI
        run: ./dist/Waylively-*.AppImage --help

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" \
            -f target_commitish="$GITHUB_SHA" \
            --jq '.body' > release-notes.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md
            gh release upload "$TAG" dist/*.AppImage --clobber
          else
            gh release create "$TAG" dist/*.AppImage \
              --title "$TAG" \
              --notes-file release-notes.md
          fi