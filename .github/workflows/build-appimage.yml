name: Build AppImage

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-appimage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream squashfs-tools

      - name: Python syntax check
        run: python3 -m compileall waylively

      - name: Build AppImage
        run: bash scripts/build-appimage.sh

      - name: Smoke test AppImage CLI
        run: ./dist/Waylively-*.AppImage --help

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: waylively-appimage-${{ github.sha }}
          path: dist/*.AppImage
          if-no-files-found: error
