<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waylively Starfield Drift</title>
<style>
  html, body, canvas { margin: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at center, #131c33, #04070d 72%); }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const mouse = { x: 0, y: 0 };
  let stars = [];

  function reset() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    mouse.x = innerWidth / 2;
    mouse.y = innerHeight / 2;
    stars = Array.from({ length: Math.max(120, Math.floor(innerWidth * innerHeight / 14000)) }, () => ({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      z: 0.2 + Math.random() * 1.1,
      size: 0.6 + Math.random() * 1.9,
      twinkle: Math.random() * Math.PI * 2,
    }));
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const px = (mouse.x - canvas.width / 2) * 0.018;
    const py = (mouse.y - canvas.height / 2) * 0.018;

    for (const star of stars) {
      const x = star.x + px * star.z;
      const y = star.y + py * star.z;
      const alpha = 0.35 + (Math.sin(t * 0.0012 + star.twinkle) + 1) * 0.22;

      ctx.fillStyle = `rgba(225, 235, 255, ${alpha})`;
      ctx.beginPath();
      ctx.arc(x, y, star.size * star.z, 0, Math.PI * 2);
      ctx.fill();

      if (star.z > 0.9) {
        ctx.strokeStyle = `rgba(120, 175, 255, ${alpha * 0.35})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x - 8, y);
        ctx.lineTo(x + 8, y);
        ctx.moveTo(x, y - 8);
        ctx.lineTo(x, y + 8);
        ctx.stroke();
      }
    }

    requestAnimationFrame(draw);
  }

  addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
  addEventListener('resize', reset);
  reset();
  requestAnimationFrame(draw);
</script>
</body>
</html>
